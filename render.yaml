services:
  - type: web
    name: open-health-risk-engine
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r runtime_requirements.txt && python -m src.verify_runtime
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    healthCheckPath: /_stcore/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: PROJECT_REPO_URL
        value: https://github.com/andyombogo/open-health-risk-engine
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: "false"
